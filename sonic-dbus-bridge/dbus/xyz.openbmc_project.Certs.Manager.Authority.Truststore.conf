<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
    <policy user="root">
        <allow own="xyz.openbmc_project.Certs.Manager.Authority.Truststore"/>
        <allow send_destination="xyz.openbmc_project.Certs.Manager.Authority.Truststore"/>
        <allow send_interface="xyz.openbmc_project.Certs.Install"/>
        <allow send_interface="xyz.openbmc_project.Collection.DeleteAll"/>
    </policy>
</busconfig>

