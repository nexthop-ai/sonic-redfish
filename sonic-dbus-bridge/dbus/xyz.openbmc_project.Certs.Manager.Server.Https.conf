<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-Bus Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!--
  D-Bus policy for sonic-dbus-bridge HTTPS Certificate Manager.

  This allows the sonic-dbus-bridge process to own the
  xyz.openbmc_project.Certs.Manager.Server.Https service name on the system bus
  and expose xyz.openbmc_project.Certs.* interfaces.
-->
<busconfig>

  <!-- Only root can own the xyz.openbmc_project.Certs.Manager.Server.Https bus -->
  <policy user="root">
    <allow own="xyz.openbmc_project.Certs.Manager.Server.Https"/>
    <allow send_destination="xyz.openbmc_project.Certs.Manager.Server.Https"/>
  </policy>

  <!-- Allow all users to call methods on our objects -->
  <policy context="default">
    <allow send_destination="xyz.openbmc_project.Certs.Manager.Server.Https"/>
    <allow receive_sender="xyz.openbmc_project.Certs.Manager.Server.Https"/>
  </policy>

</busconfig>

