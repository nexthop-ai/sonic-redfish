<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!--
  D-Bus policy for sonic-dbus-bridge software manager.

  This allows the sonic-dbus-bridge process to own the
  xyz.openbmc_project.Software.BMC.Updater service name on the system bus
  and expose xyz.openbmc_project.Software.* interfaces for FirmwareInventory.
-->
<busconfig>

  <!-- Only root can own the xyz.openbmc_project.Software.BMC.Updater bus -->
  <policy user="root">
    <allow own="xyz.openbmc_project.Software.BMC.Updater"/>
    <allow send_destination="xyz.openbmc_project.Software.BMC.Updater"/>
  </policy>

  <!-- Allow all users to call methods on our objects -->
  <policy context="default">
    <allow send_destination="xyz.openbmc_project.Software.BMC.Updater"/>
    <allow receive_sender="xyz.openbmc_project.Software.BMC.Updater"/>
  </policy>

</busconfig>

