[supervisord]
logfile_maxbytes=1MB
logfile_backups=2
nodaemon=true

[eventlistener:dependent-startup]
command=python3 -m supervisord_dependent_startup
autostart=true
autorestart=unexpected
startretries=0
exitcodes=0,3
events=PROCESS_STATE
buffer_size=1024

[eventlistener:supervisor-proc-exit-listener]
command=/usr/local/bin/supervisor-proc-exit-listener --container-name bmcweb
events=PROCESS_STATE_EXITED,PROCESS_STATE_RUNNING
autostart=true
autorestart=unexpected
buffer_size=1024

[program:rsyslogd]
command=/usr/sbin/rsyslogd -n -iNONE
priority=1
autostart=false
autorestart=unexpected
stdout_logfile=NONE
stdout_syslog=true
stderr_logfile=NONE
stderr_syslog=true
dependent_startup=true

[program:sonic-dbus-bridge]
command=/usr/bin/sonic-dbus-bridge
environment=SONIC_DBUS_BRIDGE_LOG_LEVEL="INFO"
priority=2
autostart=false
autorestart=true
stdout_logfile=NONE
stdout_syslog=true
stderr_logfile=NONE
stderr_syslog=true
startsecs=5
dependent_startup=true
dependent_startup_wait_for=rsyslogd:running

[program:bmcweb]
# Use systemd-socket-activate to simulate socket activation inside the container
# This creates sockets on port 443 and passes them to bmcweb via LISTEN_FDS
command=/usr/bin/systemd-socket-activate -l 0.0.0.0:443 --fdname=bmcweb_443_https_auth /usr/bin/bmcweb
priority=3
autostart=false
autorestart=true
stdout_logfile=NONE
stdout_syslog=true
stderr_logfile=NONE
stderr_syslog=true
startsecs=10
dependent_startup=true
dependent_startup_wait_for=sonic-dbus-bridge:running

